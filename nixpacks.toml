[phases.setup]
nixPkgs = ["nodejs_22"]
cmds = ["useradd -m -s /bin/bash node || true"]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = ["npm run build", "chown -R node:node /app || true"]

[start]
cmd = "su -p node -c \"PATH=$PATH npm run start\""

[variables]
NODE_ENV = "production"
